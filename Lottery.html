<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องมือสุ่มเลข (จำลอง)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        
        /* แอนิเมชันตอนตัวเลขกำลังวิ่ง */
        .rolling {
            animation: pulse 0.1s infinite;
            filter: blur(1px); /* เพิ่มความเบลอนิดๆ ให้ดูเหมือนวิ่งเร็วมาก */
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 to-blue-500 min-h-screen flex justify-center items-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">🎲 เครื่องมือสุ่มเลข</h1>
        
        <div class="mb-4">
            <label for="num-digits" class="block text-gray-700 text-sm font-bold mb-2">จำนวนหลัก:</label>
            <input type="number" id="num-digits" value="6" min="1" max="10" class="shadow appearance-none border rounded-xl w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        
        <div class="mb-4">
            <label for="num-results" class="block text-gray-700 text-sm font-bold mb-2">จำนวนผลลัพธ์:</label>
            <input type="number" id="num-results" value="1" min="1" max="100" class="shadow appearance-none border rounded-xl w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        
        <div class="mb-4">
            <button id="generate-button" class="bg-gradient-to-r from-green-400 to-blue-500 hover:from-green-500 hover:to-blue-600 text-white font-bold py-3 px-4 rounded-xl focus:outline-none shadow-lg w-full transition duration-200 transform active:scale-95">
                สุ่มเลข
            </button>
        </div>

        <div class="mb-6">
            <button id="view-history-button" class="bg-purple-50 text-purple-700 hover:bg-purple-100 font-bold py-2 px-4 rounded-xl w-full transition duration-200 border border-purple-200">
                📜 ดูประวัติการสุ่ม
            </button>
        </div>

        <div id="results-container" class="mt-4 border-t pt-4">
            <h2 class="text-lg font-semibold text-gray-800 mb-2 text-center">ผลลัพธ์:</h2>
            <ul id="results-list" class="list-none p-0 flex flex-col items-center">
                <li class="text-gray-300 text-center py-4">กดปุ่มเพื่อเริ่มสุ่ม</li>
            </ul>
        </div>
    </div>

    <script>
        const numDigitsInput = document.getElementById('num-digits');
        const numResultsInput = document.getElementById('num-results');
        const generateButton = document.getElementById('generate-button');
        const viewHistoryButton = document.getElementById('view-history-button');
        const resultsList = document.getElementById('results-list');

        // ฟังก์ชันบันทึกลง localStorage
        function saveResult(newNumbers) {
            let history = JSON.parse(localStorage.getItem('myHistory')) || [];
            const entry = {
                time: new Date().toLocaleTimeString('th-TH'),
                numbers: newNumbers
            };
            history.unshift(entry);
            if (history.length > 20) history.pop();
            localStorage.setItem('myHistory', JSON.stringify(history));
        }

        // ฟังก์ชันสร้างเลขสุ่มแบบเดี่ยวๆ
        function getRandomValue(digits) {
            let num = '';
            for (let i = 0; i < digits; i++) {
                num += Math.floor(Math.random() * 10);
            }
            return num;
        }

        generateButton.addEventListener('click', () => {
            const numDigits = parseInt(numDigitsInput.value);
            const numResults = parseInt(numResultsInput.value);

            if (numDigits > 0 && numResults > 0) {
                // 1. เตรียมพื้นที่และปิดปุ่มชั่วคราว
                resultsList.innerHTML = '';
                generateButton.disabled = true;
                generateButton.classList.add('opacity-50', 'cursor-not-allowed');
                
                // สร้างรายการ <li> รอไว้ก่อนตามจำนวนที่ต้องการสุ่ม
                const listItems = [];
                for(let i=0; i < numResults; i++) {
                    const li = document.createElement('li');
                    li.classList.add('text-center', 'py-1', 'text-3xl', 'text-blue-600', 'font-bold', 'tracking-widest', 'rolling');
                    li.textContent = getRandomValue(numDigits);
                    resultsList.appendChild(li);
                    listItems.push(li);
                }

                // 2. เริ่มแอนิเมชันตัวเลขวิ่งรัวๆ
                let duration = 0;
                const maxDuration = 20; // จำนวนรอบที่วิ่ง (20 รอบ * 50ms = 1 วินาที)
                
                const interval = setInterval(() => {
                    listItems.forEach(li => {
                        li.textContent = getRandomValue(numDigits);
                    });
                    duration++;

                    // 3. เมื่อถึงเวลาหยุด
                    if (duration >= maxDuration) {
                        clearInterval(interval);
                        
                        const finalResults = [];
                        listItems.forEach(li => {
                            const finalNum = getRandomValue(numDigits);
                            li.textContent = finalNum;
                            li.classList.remove('rolling'); // เอาแอนิเมชันออก
                            li.classList.add('text-green-500'); // เปลี่ยนสีให้รู้ว่าหยุดแล้ว
                            finalResults.push(finalNum);
                        });

                        // บันทึกข้อมูล
                        saveResult(finalResults);

                        // เปิดปุ่มคืน
                        generateButton.disabled = false;
                        generateButton.classList.remove('opacity-50', 'cursor-not-allowed');
                    }
                }, 50); // เปลี่ยนเลขทุกๆ 50 มิลลิวินาที

            } else {
                alert('กรุณากรอกข้อมูลให้ถูกต้อง');
            }
        });

        viewHistoryButton.addEventListener('click', () => {
            window.location.href = 'history.html'; 
        });
    </script>
</body>
</html>
