<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมจับคู่การ์ด Memory Game</title>
    <style>
        /* --- CSS: ส่วนตกแต่งหน้าตาเกม --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .status-container {
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 8px;
        }

        /* พื้นที่วางการ์ด (Grid) */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 100px); /* 4 คอลัมน์กว้าง 100px */
            grid-template-rows: repeat(4, 100px);    /* 4 แถวสูง 100px */
            gap: 15px;
            perspective: 1000px; /* เพิ่มมิติ 3D ตอนพลิกการ์ด */
        }

        /* สไตล์ของการ์ดแต่ละใบ */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s; /* เวลาในการพลิก */
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* เมื่อการ์ดถูกเปิด */
        .card.flip {
            transform: rotateY(180deg);
            cursor: default; /* ห้ามคลิกซ้ำ */
        }

        /* หน้าของการ์ด (หน้า/หลัง) */
        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden; /* ซ่อนหน้าหลังตอนพลิก */
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            user-select: none; /* ห้ามคลุมดำ */
        }

        /* หน้าหลังของการ์ด (ตอนคว่ำ) */
        .card-back {
            background-color: #34495e;
            color: #bdc3c7;
        }

        /* หน้าหน้าของการ์ด (ตอนเปิดโชว์รูป) */
        .card-front {
            background-color: #ecf0f1;
            transform: rotateY(180deg); /* หมุนรอไว้ก่อน */
            color: #333;
        }

        /* สไตล์ปุ่มเริ่มใหม่ */
        #restart-btn {
            margin-top: 30px;
            padding: 10px 25px;
            font-size: 1.1rem;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            display: none; /* ซ่อนไว้ก่อนจนกว่าจะจบเกม */
        }

        #restart-btn:hover {
            background-color: #c0392b;
        }

    </style>
</head>
<body>

    <h1>🧠 เกมจับคู่การ์ดวัดความจำ</h1>
    
    <div class="status-container">
        <span id="moves-count">จำนวนครั้งที่เปิด: 0</span> | 
        <span id="matches-count">จับคู่ได้: 0/8</span>
    </div>

    <div class="game-board" id="game-board"></div>

    <button id="restart-btn" onclick="startGame()">เล่นใหม่อีกครั้ง</button>

    <script>
        /* --- JAVASCRIPT: ส่วนควบคุมตรรกะเกม --- */
        const gameBoard = document.getElementById('game-board');
        const movesDisplay = document.getElementById('moves-count');
        const matchesDisplay = document.getElementById('matches-count');
        const restartBtn = document.getElementById('restart-btn');

        // รายการไอคอนหรืออิโมจิที่จะใช้เป็นคู่การ์ด (8 คู่ สำหรับการ์ด 16 ใบ)
        const items = ['🍕', '🍕', '🐱', '🐱', '🚀', '🚀', '🎸', '🎸', '🍦', '🍦', '💎', '💎', '👻', '👻', '🏀', '🏀'];

        let hasFlippedCard = false; // สถานะว่ามีเปิดการ์ดใบแรกอยู่ไหม
        let lockBoard = false;       // ล็อคบอร์ดห้ามคลิกตอนกำลังเช็คคู่
        let firstCard, secondCard;  // เก็บข้อมูลการ์ดใบที่ 1 และ 2
        let moves = 0;              // นับจำนวนครั้งที่เปิด
        let matches = 0;            // นับจำนวนคู่ที่หาเจอ

        // ฟังก์ชันสลับลำดับการ์ดแบบสุ่ม (Shuffle)
        function shuffle(array) {
            array.sort(() => Math.random() - 0.5);
        }

        // ฟังก์ชันสร้างการ์ดลงบนกระดาน
        function createBoard() {
            gameBoard.innerHTML = ''; // เคลียร์บอร์ดเก่า
            shuffle(items); // สุ่มลำดับ

            // ลูปสร้าง HTML element ของการ์ดแต่ละใบ
            items.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.framework = item; // เก็บค่าไอคอนไว้เช็คคู่

                // สร้างหน้าหน้า
                const frontFace = document.createElement('div');
                frontFace.classList.add('card-front');
                frontFace.innerText = item; // ใส่ไอคอน

                // สร้างหน้าหลัง
                const backFace = document.createElement('div');
                backFace.classList.add('card-back');
                backFace.innerText = '❓'; // ใส่เครื่องหมายคำถาม

                card.appendChild(frontFace);
                card.appendChild(backFace);
                card.addEventListener('click', flipCard); // ใส่ Event คลิก
                gameBoard.appendChild(card);
            });
        }

        // ฟังก์ชันตอนคลิกเปิดการ์ด
        function flipCard() {
            // ถ้าบอร์ดโดนล็อค หรือคลิกการ์ดใบเดิม ให้จบฟังก์ชัน
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip'); // เพิ่มคลาส CSS เพื่อพลิกการ์ด

            if (!hasFlippedCard) {
                // เป็นการคลิกใบแรกในรอบนี้
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // เป็นการคลิกใบที่สอง
            secondCard = this;
            incrementMoves(); // นับจำนวนครั้งที่เปิด
            checkForMatch();  // ไปเช็คว่าเหมือนกันไหม
        }

        // ฟังก์ชันเช็คว่าการ์ดที่เปิด 2 ใบ เหมือนกันไหม
        function checkForMatch() {
            // เช็คจาก data-framework ที่เก็บไว้
            let isMatch = firstCard.dataset.framework === secondCard.dataset.framework;

            isMatch ? disableCards() : unflipCards();
        }

        // กรณีจับคู่สำเร็จ: ลบ Event คลิกออก ห้ามใบนั้นคว่ำกลับ
        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            matches++;
            updateStatusDisplay();
            resetBoardVars();

            // ถ้าจับคู่ครบหมดแล้ว
            if (matches === items.length / 2) {
                setTimeout(() => {
                    alert('ยินดีด้วย! คุณจับคู่ครบหมดแล้วครับ\nใช้เวลาไป ' + moves + ' ครั้ง');
                    restartBtn.style.display = 'block'; // โชว์ปุ่มเริ่มใหม่
                }, 500);
            }
        }

        // กรณีจับคู่ไม่สำเร็จ: รอแป๊บนึงแล้วคว่ำการ์ดกลับ
        function unflipCards() {
            lockBoard = true; // ล็อคบอร์ดห้ามคลิกใบอื่น

            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoardVars(); // ปลดล็อคบอร์ดหลังคว่ำกลับแล้ว
            }, 1000); // รอ 1 วินาที
        }

        // ฟังก์ชันนับจำนวนครั้งที่เปิด (คลิกครบ 2 ใบ นับเป็น 1 ครั้ง)
        function incrementMoves() {
            moves++;
            updateStatusDisplay();
        }

        // อัปเดตตัวเลขแสดงสถานะบนหน้าจอ
        function updateStatusDisplay() {
            movesDisplay.innerText = 'จำนวนครั้งที่เปิด: ' + moves;
            matchesDisplay.innerText = 'จับคู่ได้: ' + matches + '/8';
        }

        // ฟังก์ชันรีเซ็ตค่าตัวแปรควบคุมบอร์ดหลังเช็คเสร็จ
        function resetBoardVars() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // ฟังก์ชันเริ่มต้นเกมใหม่
        function startGame() {
            // รีเซ็ตสถานะทุกอย่าง
            moves = 0;
            matches = 0;
            updateStatusDisplay();
            restartBtn.style.display = 'none';
            resetBoardVars();
            
            // สร้างกระดานใหม่ (สุ่มใหม่)
            createBoard();
        }

        // เรียกใช้งานเกมทันทีที่เปิดหน้าเว็บ
        startGame();

    </script>
</body>
</html>
