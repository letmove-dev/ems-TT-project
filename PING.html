<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Fira Code', monospace; background-color: #0a0a0a; color: #00ff41; }
        .glitch { text-shadow: 0 0 5px #00ff41; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="p-8">
     <div class="absolute top-4 right-4">
                <a href="javascript:history.back()" class="bg-gray-800 hover:bg-blue-600 text-white px-4 py-2 rounded-lg shadow-md transition duration-200">
                     ← กลับไปหน้าสุ่มเลข
                  </a>
                </div>
    <div class="max-w-4xl mx-auto border border-green-900 bg-black/50 p-6 rounded-lg shadow-[0_0_20px_rgba(0,255,65,0.1)]">
        <h1 class="text-2xl font-bold mb-6 glitch uppercase tracking-widest border-b border-green-900 pb-2">
            > Network_Status_Dashboard v1.0
        </h1>

        <div id="monitor-list" class="space-y-1">
            </div>

        <div class="mt-8 pt-4 border-t border-green-900 text-xs opacity-50">
            [SYSTEM] Auto-refreshing every 30 seconds...
        </div>
    </div>

    <script>
        // กำหนดรายการที่ต้องการเช็ค (เปลี่ยน URL เป็นของคุณได้)
        const servers = [
            { name: "Main Website", url: "https://spectrumpro.celestica.com/cth/" },
            { name: "API DES", url: "https://cls-ioperation.azurewebsites.net/" },
            { name: "Auth Service", url: "\\\ctHL-IT2020" },
            { name: "Database Node", url: "https://8.8.8.8" } // อันนี้จะเฟลเพราะ CORS หรือ IP ตรงๆ
        ];

        async function checkServer(server) {
            const start = Date.now();
            try {
                // ใช้โหมด no-cors เพื่อให้สามารถยิงข้ามเว็บได้ (แม้จะอ่านข้อมูลข้างในไม่ได้ แต่เช็คว่าตายไหมได้)
                await fetch(server.url, { mode: 'no-cors', cache: 'no-cache' });
                const latency = Date.now() - start;
                return { status: 'ONLINE', time: latency };
            } catch (error) {
                return { status: 'OFFLINE', time: '---' };
            }
        }

        async function updateDashboard() {
            const container = document.getElementById('monitor-list');
            container.innerHTML = ''; // ล้างค่าเก่า

            for (const server of servers) {
                const res = await checkServer(server);
                const isOnline = res.status === 'ONLINE';
                
                const html = `
                    <div class="flex items-center justify-between p-3 border border-green-900/30 rounded bg-green-900/5">
                        <div class="flex items-center space-x-4">
                            <span class="status-dot ${isOnline ? 'bg-green-500 shadow-[0_0_3px_#22c55e]' : 'bg-red-500 shadow-[0_0_10px_#ef4444]'}"></span>
                            <span class="font-bold ">${server.name}</span>
                            <span class="text-xs opacity-40 bg-red-500 shadow-[0_0_10px_#ef4444]">${server.url}</span>
                        </div>
                        <div class="text-right">
                            <span class="${isOnline ? 'text-green-400' : 'text-red-400'}">${res.status}</span>
                            <span class="ml-4 text-xs opacity-60">${res.time}ms</span>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            }
        }

        // รันทันทีและตั้งเวลา refresh
        updateDashboard();
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>
